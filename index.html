<!doctype html>
<html lang="id">
  <head>
    <script>
      // Bersihkan parameter pelacakan (seperti fbclid, utm_*, dll.) dari URL agar tampilan lebih rapi
      (function() {
        try {
          var url = new URL(window.location.href);
          var paramsToRemove = ['fbclid', 'gclid', 'wbraid', 'gbraid', 'msclkid'];
          var updated = false;
          
          for (var i = 0; i < paramsToRemove.length; i++) {
            var param = paramsToRemove[i];
            if (url.searchParams.has(param)) {
              url.searchParams.delete(param);
              updated = true;
            }
          }
          
          var utmParams = [];
          url.searchParams.forEach(function(value, key) {
            if (key.indexOf('utm_') === 0) {
              utmParams.push(key);
            }
          });
          for (var j = 0; j < utmParams.length; j++) {
            url.searchParams.delete(utmParams[j]);
            updated = true;
          }

          if (updated) {
            var cleanUrl = url.pathname + url.search + url.hash;
            window.history.replaceState(null, '', cleanUrl);
          }
        } catch (e) {
          console.error('Error cleaning URL parameters:', e);
        }
      })();
    </script>
    <script>
      // Crop transparency from favicon dynamically so it fills the tab at standard size
      (function() {
        var img = new Image();
        img.src = '/images/logo_square.png';
        img.onload = function() {
          try {
            var canvas = document.createElement('canvas');
            var ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            
            var imgData = ctx.getImageData(0, 0, img.width, img.height);
            var data = imgData.data;
            var minX = img.width, minY = img.height, maxX = 0, maxY = 0;
            
            for (var y = 0; y < img.height; y++) {
              for (var x = 0; x < img.width; x++) {
                var alpha = data[(y * img.width + x) * 4 + 3];
                if (alpha > 10) {
                  if (x < minX) minX = x;
                  if (x > maxX) maxX = x;
                  if (y < minY) minY = y;
                  if (y > maxY) maxY = y;
                }
              }
            }
            
            if (maxX >= minX && maxY >= minY) {
              var cropWidth = maxX - minX + 1;
              var cropHeight = maxY - minY + 1;
              var size = Math.max(cropWidth, cropHeight);
              
              var cropCanvas = document.createElement('canvas');
              cropCanvas.width = size;
              cropCanvas.height = size;
              var cropCtx = cropCanvas.getContext('2d');
              
              var dx = (size - cropWidth) / 2;
              var dy = (size - cropHeight) / 2;
              cropCtx.drawImage(img, minX, minY, cropWidth, cropHeight, dx, dy, cropWidth, cropHeight);
              
              var link = document.querySelector("link[rel*='icon']");
              if (!link) {
                link = document.createElement('link');
                link.rel = 'icon';
                document.head.appendChild(link);
              }
              link.href = cropCanvas.toDataURL('image/png');
            }
          } catch (e) {
            console.error('Error cropping favicon:', e);
          }
        };
      })();
    </script>
